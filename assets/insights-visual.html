<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>RAG rollup — Not On Mondays insights visual</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #EFEAE0;
    --card: #EAE7DE;
    --ink: #1A1A1F;
    --ink-40: rgba(26,26,31,0.4);
    --ink-12: rgba(26,26,31,0.12);
    --ink-6:  rgba(26,26,31,0.06);
    --blue:   #2B2CE0;
    --blue-20: rgba(43,44,224,0.22);
    --sage:   #6E8A5D;
    --sage-20: rgba(110,138,93,0.24);
    --clay:   #B55A3D;
    --clay-20: rgba(181,90,61,0.22);
    --amber:  #C69A33;
    --amber-20: rgba(198,154,51,0.24);
    --serif: "Cormorant Garamond", Georgia, serif;
    --mono:  "JetBrains Mono", ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; background: var(--bg); color: var(--ink); font-family: var(--serif); min-height: 100vh; display:flex; align-items:center; justify-content:center; padding: 40px; }
  .frame {
    background: var(--card);
    width: 100%;
    max-width: 560px;
    aspect-ratio: 3 / 2;
    border: 1px solid var(--ink-12);
    overflow: hidden;
  }
  .frame svg { display: block; width: 100%; height: 100%; }

  .nom-kicker { font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em; fill: rgba(26,26,31,0.6); }
  .nom-kicker-blue { fill: var(--blue); }
  .nom-rule { stroke: var(--ink-12); stroke-width: 0.75; }
  .nom-streamlabel { font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; fill: var(--ink); text-transform: uppercase; }
  .nom-weeknum { font-family: var(--mono); font-size: 8px; letter-spacing: 0.08em; fill: var(--ink-40); }
  .nom-cell {
    transition: fill 0.5s ease calc(var(--c, 0) * 30ms),
                transform 0.5s ease calc(var(--c, 0) * 30ms);
    transform-box: fill-box;
    transform-origin: center;
  }
  .nom-none { fill: var(--ink-6); }
  .nom-ok   { fill: var(--sage-20); }
  .nom-go   { fill: var(--blue-20); }
  .nom-warn { fill: var(--amber-20); }
  .nom-bad  { fill: var(--clay-20); }

  .frame:hover .nom-ok   { fill: var(--sage); }
  .frame:hover .nom-go   { fill: var(--blue); }
  .frame:hover .nom-warn { fill: var(--amber); }
  .frame:hover .nom-bad  { fill: var(--clay); transform: scale(1.08); }

  .nom-legend .nom-cell { fill-opacity: 1; }
  .nom-legendtext { font-family: var(--mono); font-size: 8px; letter-spacing: 0.12em; fill: rgba(26,26,31,0.6); text-transform: uppercase; }
</style>
</head>
<body>

    <rect x="352" y="108" width="26" height="18" class="nom-cell nom-bad"  rx="1.5" style="--c:7"/>

    <text x="132" y="143" text-anchor="end" class="nom-streamlabel">Coffee &amp; clarity</text>
    <rect x="142" y="130" width="26" height="18" class="nom-cell nom-none" rx="1.5" style="--c:0"/>
    <rect x="172" y="130" width="26" height="18" class="nom-cell nom-none" rx="1.5" style="--c:1"/>
    <rect x="202" y="130" width="26" height="18" class="nom-cell nom-none" rx="1.5" style="--c:2"/>

  </svg>
</div>
</body>
</html>
