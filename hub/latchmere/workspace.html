<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latchmere Associates — Hub</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #111124;
  color: #f2f0e8;
  font-family: 'DM Mono', monospace;
  font-weight: 300;
  min-height: 100vh;
}
.accent-bar {
  position: fixed;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: #1a2ad4;
  z-index: 10;
}
.bg-light {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse 900px 700px at 80% 20%, rgba(26,42,212,0.05) 0%, transparent 70%),
    radial-gradient(ellipse 600px 500px at 0% 80%, rgba(26,42,212,0.04) 0%, transparent 60%);
}
.bg-grid {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image:
    linear-gradient(rgba(242,240,232,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(242,240,232,0.018) 1px, transparent 1px);
  background-size: 72px 72px;
}
main {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
}
.card {
  max-width: 520px;
  width: 100%;
}
.wordmark {
  font-family: 'DM Mono', monospace;
  font-weight: 300;
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(242,240,232,0.35);
  margin-bottom: 48px;
}
.wordmark strong { color: #1a2ad4; font-weight: 400; }
.eyebrow {
  font-family: 'DM Mono', monospace;
  font-weight: 400;
  font-size: 9px;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: #1a2ad4;
  margin-bottom: 16px;
}
h1 {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 300;
  font-size: clamp(28px, 4vw, 44px);
  line-height: 1.1;
  color: #f2f0e8;
  margin-bottom: 20px;
}
.rule {
  width: 40px;
  height: 1px;
  background: rgba(26,42,212,0.5);
  margin: 28px 0;
}
p {
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  font-size: 15px;
  line-height: 1.7;
  color: rgba(242,240,232,0.52);
  margin-bottom: 16px;
}
.hub-link {
  display: inline-block;
  font-family: 'DM Mono', monospace;
  font-weight: 300;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(242,240,232,0.35);
  text-decoration: none;
  border-bottom: 1px solid rgba(242,240,232,0.12);
  padding-bottom: 2px;
  margin-top: 8px;
  transition: color 0.18s, border-color 0.18s;
}
.hub-link:hover {
  color: rgba(242,240,232,0.65);
  border-color: rgba(242,240,232,0.3);
}
@media (prefers-reduced-motion: reduce) {
  .hub-link { transition: none; }
}
</style>
</head>
<body>

<!-- Cloudflare Access controls route-level authorization. This page is only a workspace placeholder. -->

<div class="accent-bar" aria-hidden="true"></div>
<div class="bg-light" aria-hidden="true"></div>
<div class="bg-grid" aria-hidden="true"></div>

<main>
  <div class="card">
    <p class="wordmark"><strong>NOM</strong> &middot; Hub</p>
    <p class="eyebrow" aria-hidden="true">Client workspace</p>
    <h1>Latchmere Associates is being prepared.</h1>
    <div class="rule" aria-hidden="true"></div>
    <p>This workspace is currently being set up. Check back soon.</p>
    <a class="hub-link" href="/hub/">Back to hub</a>
  </div>
</main>

</body>
</html>
